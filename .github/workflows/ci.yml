name: CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    name: Lint, typecheck, test, build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install

      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm check:data
      - run: pnpm drift
      - run: pnpm build
